[build]
  # Comando para construir el proyecto
  command = "npm run build"
  
  # Directorio donde Vite genera los archivos de producción
  publish = "dist"

# Configuración para Single Page Application (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Configuración de Node.js (opcional pero recomendado)
[build.environment]
  NODE_VERSION = "18"
